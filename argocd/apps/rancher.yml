apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rancher
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  # Igual ao homolog: chart VENDORIZADO no repo (argocd/rancher: Chart.yaml + charts/*.tgz + values.yaml).
  # O Argo CD renderiza o umbrella chart do path local — NÃO contata o repo Helm remoto (evita o
  # erro "repository not accessible" / NoSuchKey).
  source:
    repoURL: https://github.com/brasleiro01/home-lab/
    targetRevision: HEAD
    path: argocd/rancher
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: cattle-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: false          # Rancher muta seus próprios recursos; selfHeal brigaria
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true   # CRDs grandes do Rancher
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  ignoreDifferences:
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
      jsonPointers:
        - /webhooks
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      jsonPointers:
        - /webhooks
