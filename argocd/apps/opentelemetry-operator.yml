apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: opentelemetry-operator
  namespace: argocd
  annotations:
    # parte da stack de observabilidade; sobe cedo (a k8s-monitor depende da CRD + webhook)
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://github.com/brasleiro01/home-lab/
    targetRevision: HEAD
    path: argocd/observability/opentelemetry-operator
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: observability          # parte da stack
  syncPolicy:
    automated:
      prune: true
      selfHeal: false          # cert-manager injeta o caBundle; selfHeal brigaria com ele
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true   # CRDs grandes (OpenTelemetryCollector/Instrumentation)
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  ignoreDifferences:
    # o cert-manager injeta o caBundle nas CRDs (conversion) e nos webhooks — ignorar p/ não brigar
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      jsonPointers:
        - /spec/conversion/webhook/clientConfig/caBundle
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
      jsonPointers:
        - /webhooks
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      jsonPointers:
        - /webhooks
