apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  annotations:
    # Evita timeout durante sync de CRDs grandes
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  sources:
    # Fonte 1: Helm chart do prometheus-community
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: "65.1.1"
      helm:
        valueFiles:
          - $values/argocd/kube-prometheus-stack/values.yaml
    # Fonte 2: Repo git com o values.yaml versionado
    - repoURL: https://github.com/brasleiro01/home-lab/
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - ApplyOutOfSyncOnly=true
  # Campos gerenciados pelo operator que o ArgoCD não deve reconciliar
  ignoreDifferences:
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      jqPathExpressions:
        - .webhooks[]?.clientConfig.caBundle
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
      jqPathExpressions:
        - .webhooks[]?.clientConfig.caBundle
    - group: ""
      kind: Secret
      name: kube-prometheus-stack-admission
      jqPathExpressions:
        - .data
