apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app
  namespace: demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: demo-app
  template:
    metadata:
      labels:
        app: demo-app
      annotations:
        # auto-instrumentação nginx pelo OpenTelemetry Operator (Instrumentation "demo-app-otel").
        # OBS: o módulo OTel do operator é compilado p/ nginx Debian (glibc) — por isso a imagem
        # deixou de ser alpine (musl). Se o pod crashar em "load_module", ver troubleshooting.
        instrumentation.opentelemetry.io/inject-nginx: "demo-app-otel"
    spec:
      containers:
        - name: demo-app
          image: nginx:1.27
          ports:
            - containerPort: 80
          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
            timeoutSeconds: 3
      volumes:
        - name: html
          configMap:
            name: demo-html
