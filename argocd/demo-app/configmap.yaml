apiVersion: v1
kind: ConfigMap
metadata:
  name: demo-html
  namespace: demo
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="pt-BR">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Demo App — Kubernetes Home Lab</title>
      <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
          font-family: 'Segoe UI', sans-serif;
          background: #0f172a;
          color: #e2e8f0;
          min-height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
        }

        .card {
          background: #1e293b;
          border: 1px solid #334155;
          border-radius: 16px;
          padding: 48px;
          max-width: 560px;
          width: 90%;
          text-align: center;
          box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .badge {
          display: inline-block;
          background: #22c55e22;
          color: #22c55e;
          border: 1px solid #22c55e44;
          border-radius: 99px;
          padding: 4px 16px;
          font-size: 13px;
          font-weight: 600;
          letter-spacing: 1px;
          margin-bottom: 24px;
        }

        h1 {
          font-size: 2rem;
          font-weight: 700;
          margin-bottom: 12px;
          background: linear-gradient(135deg, #38bdf8, #818cf8);
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
        }

        p {
          color: #94a3b8;
          line-height: 1.6;
          margin-bottom: 32px;
        }

        .stack {
          display: flex;
          gap: 10px;
          justify-content: center;
          flex-wrap: wrap;
          margin-bottom: 32px;
        }

        .tag {
          background: #0f172a;
          border: 1px solid #334155;
          border-radius: 8px;
          padding: 6px 14px;
          font-size: 13px;
          color: #cbd5e1;
        }

        .info {
          background: #0f172a;
          border: 1px solid #1e3a5f;
          border-radius: 12px;
          padding: 20px;
          text-align: left;
        }

        .info-row {
          display: flex;
          justify-content: space-between;
          padding: 8px 0;
          border-bottom: 1px solid #1e293b;
          font-size: 14px;
        }

        .info-row:last-child { border-bottom: none; }
        .info-label { color: #64748b; }
        .info-value { color: #38bdf8; font-weight: 600; }
      </style>
    </head>
    <body>
      <div class="card">
        <div class="badge">● ONLINE</div>
        <h1>Demo App</h1>
        <p>Aplicação de teste rodando no cluster Kubernetes com Traefik como Ingress Controller e TLS via cert-manager.</p>

        <div class="stack">
          <span class="tag">☸️ k3s</span>
          <span class="tag">🔀 Traefik</span>
          <span class="tag">🔒 cert-manager</span>
          <span class="tag">☁️ Cloudflare</span>
        </div>

        <div class="info">
          <div class="info-row">
            <span class="info-label">Namespace</span>
            <span class="info-value">demo</span>
          </div>
          <div class="info-row">
            <span class="info-label">Ingress</span>
            <span class="info-value">traefik</span>
          </div>
          <div class="info-row">
            <span class="info-label">Certificado</span>
            <span class="info-value">Let's Encrypt</span>
          </div>
          <div class="info-row">
            <span class="info-label">Status</span>
            <span class="info-value" style="color:#22c55e">Running ✓</span>
          </div>
        </div>
      </div>
    </body>
    </html>
