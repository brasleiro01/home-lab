# Loki homelab — SingleBinary + backend S3 apontando pro MinIO (bucket "loki").
# (adaptação do homolog: trocado IRSA/S3-AWS por MinIO, e gp3 por local-path)
loki:
  loki:
    auth_enabled: false
    commonConfig:
      replication_factor: 1
    schemaConfig:
      configs:
        - from: "2024-04-01"
          store: tsdb
          object_store: s3
          schema: v13
          index:
            prefix: loki_index_
            period: 24h
    storage:
      type: s3
      bucketNames:
        chunks: loki
        ruler: loki
      s3:
        endpoint: http://minio.observability.svc:9000
        region: us-east-1
        accessKeyId: minioadmin
        secretAccessKey: minioadmin123
        s3ForcePathStyle: true       # MinIO exige path-style
        insecure: true               # MinIO em HTTP (interno)
    limits_config:
      retention_period: 720h         # 30d
    compactor:
      retention_enabled: true
      delete_request_store: s3

  deploymentMode: SingleBinary
  singleBinary:
    replicas: 1
    persistence:
      enabled: true
      storageClass: local-path
      size: 10Gi

  gateway:
    enabled: true

  # sem IRSA (homelab): SA simples
  serviceAccount:
    create: true

  # desliga o que não se usa no modo monolítico (e o minio embutido — usamos o nosso)
  minio:
    enabled: false
  read: { replicas: 0 }
  write: { replicas: 0 }
  backend: { replicas: 0 }
  chunksCache: { enabled: false }
  resultsCache: { enabled: false }
  lokiCanary: { enabled: false }
  test: { enabled: false }
