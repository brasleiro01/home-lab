# Dashboard "as code": o sidecar do Grafana carrega qualquer ConfigMap com label
# grafana_dashboard="1" no ns observability.
# O JSON vem de dashboards/k8s-apps-logs.json via .Files.Get (RAW, sem templating do Helm) —
# assim os tokens de legenda do Grafana (pod, deployment) NAO sao interpretados pelo Helm.
# MODELO: para versionar outro dashboard, exporte o JSON, salve em dashboards/<nome>.json
# e duplique este ConfigMap trocando o nome/arquivo.
apiVersion: v1
kind: ConfigMap
metadata:
  name: dashboard-k8s-apps-logs
  namespace: observability
  labels:
    grafana_dashboard: "1"
data:
  k8s-apps-logs.json: |
{{ .Files.Get "dashboards/k8s-apps-logs.json" | indent 4 }}
