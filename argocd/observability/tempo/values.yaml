# Tempo homelab — Single Binary + backend S3 no MinIO (bucket "tempo").
# Apps enviam OTLP para tempo:4317 (gRPC) / tempo:4318 (HTTP).
tempo:
  replicas: 1

  tempo:
    retention: 72h                   # 3d
    storage:
      trace:
        backend: s3
        s3:
          bucket: tempo
          endpoint: minio.observability.svc:9000
          access_key: minioadmin
          secret_key: minioadmin123
          insecure: true             # MinIO em HTTP (interno)
          forcepathstyle: true
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: "0.0.0.0:4317"
          http:
            endpoint: "0.0.0.0:4318"

    # APM: metrics-generator gera service graph + span metrics (RED) e faz remote_write
    # pro Prometheus. Precisa do enableRemoteWriteReceiver no kube-prometheus-stack.
    metricsGenerator:
      enabled: true
      remoteWriteUrl: "http://kube-prometheus-stack-prometheus.observability.svc:9090/api/v1/write"
      processor:
        service_graphs: {}
        span_metrics:
          enable_target_info: true
    # ativa os processadores por tenant (senão o generator não roda)
    overrides:
      defaults:
        metrics_generator:
          processors:
            - service-graphs
            - span-metrics

  serviceAccount:
    create: true

  persistence:
    enabled: true
    storageClassName: local-path
    size: 10Gi
