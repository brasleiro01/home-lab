# OpenTelemetry Operator — homelab.
# O cluster TEM cert-manager: ele gera e injeta o cert do webhook + o CA das CRDs.
# (antes usávamos autoGenerateCert, mas isso deixava a CRD com annotation inválida
#  "cert-manager.io/inject-ca-from: none" e o cert-manager falhava em loop.)
opentelemetry-operator:
  manager:
    # coletor não é usado aqui (só auto-instrumentação); mantém defaults do operator
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi

  admissionWebhooks:
    certManager:
      enabled: true         # usa o cert-manager do cluster
    autoGenerateCert:
      enabled: false

  # CRDs (Instrumentation, OpenTelemetryCollector, ...) renderizadas pelo chart
  crds:
    create: true
