# Alloy homelab — DaemonSet que:
#  - lê logs dos pods e envia ao Loki local;
#  - expõe um receiver OTLP (4317/4318) e reencaminha os traces pro Tempo.
# (adaptação do homolog: labels do cluster = homelab; URLs locais)
alloy:
  controller:
    type: daemonset
    hostPID: true          # eBPF (Pyroscope) precisa enxergar os PIDs do nó

  # Expõe as portas OTLP no Service do Alloy (apps enviam p/ alloy.observability.svc:4317/4318)
  alloy:
    # eBPF profiling exige container privilegiado como root
    securityContext:
      privileged: true
      runAsUser: 0
    extraPorts:
      - name: otlp-grpc
        port: 4317
        targetPort: 4317
        protocol: TCP
      - name: otlp-http
        port: 4318
        targetPort: 4318
        protocol: TCP
    clustering:
      enabled: false
    configMap:
      content: |
        //// ─── TRACES: receiver OTLP → Tempo ───────────────────────────────
        // Apps enviam OTLP para alloy.observability.svc:4317 (gRPC) / :4318 (HTTP).
        otelcol.receiver.otlp "default" {
          grpc { endpoint = "0.0.0.0:4317" }
          http { endpoint = "0.0.0.0:4318" }
          output {
            traces = [otelcol.processor.batch.default.input]
          }
        }

        otelcol.processor.batch "default" {
          output {
            traces = [otelcol.exporter.otlp.tempo.input]
          }
        }

        // Envia os traces pro Tempo (OTLP gRPC, interno em HTTP → tls insecure)
        otelcol.exporter.otlp "tempo" {
          client {
            endpoint = "tempo.observability.svc:4317"
            tls { insecure = true }
          }
        }

        //// ─── LOGS: pods → Loki ────────────────────────────────────────────
        // Descobre todos os pods do cluster
        discovery.kubernetes "pods" {
          role = "pod"
        }

        // Normaliza labels úteis
        discovery.relabel "pods" {
          targets = discovery.kubernetes.pods.targets
          rule {
            source_labels = ["__meta_kubernetes_namespace"]
            target_label  = "namespace"
          }
          rule {
            source_labels = ["__meta_kubernetes_pod_name"]
            target_label  = "pod"
          }
          rule {
            source_labels = ["__meta_kubernetes_pod_container_name"]
            target_label  = "container"
          }
          rule {
            source_labels = ["__meta_kubernetes_pod_label_app"]
            target_label  = "app"
          }
        }

        loki.source.kubernetes "pods" {
          targets    = discovery.relabel.pods.output
          forward_to = [loki.process.default.receiver]
        }

        loki.process "default" {
          forward_to = [loki.write.default.receiver]

          // labels fixos do cluster (usados no selector do match abaixo)
          stage.static_labels {
            values = {
              cluster = "homelab",
              env     = "homelab",
            }
          }

          // ORDEM IMPORTA: os estágios seguintes SOBRESCREVEM o label "level".
          // Vai do palpite mais fraco (palavra solta) ao mais forte (campo level= e klog),
          // pra o nível REAL vencer. Isso evita falso positivo quando a linha contém a
          // palavra "error" só de passagem (ex.: o Grafana logando a própria query LogQL).

          // 1) palpite: linha com CARA de erro sem nível → error (fraco; será sobrescrito se houver nível real)
          stage.match {
            selector = "{cluster=\"homelab\"} |~ \"(?i)(exception|traceback|failed|failure|cannot |unable to|denied|timeout|refused|too many open files|out of memory|segfault)\""
            stage.static_labels {
              values = { level = "error" }
            }
          }

          // 2) nível como PALAVRA isolada (apps que imprimem "INFO"/"ERROR"); \b evita casar dentro de outra palavra
          stage.regex {
            expression = "(?i)\\b(?P<level>trace|debug|info|warning|warn|error|err|critical|crit|fatal|panic)\\b"
          }
          stage.labels {
            values = { level = "level" }
          }

          // 3) campo logfmt "level=xxx" (Grafana, Loki, muitos apps) — AUTORITATIVO, sobrescreve os palpites acima
          stage.regex {
            expression = "(?:^|\\s)level=(?P<level>[a-zA-Z]+)"
          }
          stage.labels {
            values = { level = "level" }
          }

          // 4) formato klog do Kubernetes/Go (cert-manager, kube-*, etc.): a 1a letra da
          //    linha é o nível — I=info, W=warn, E=error, F=fatal (ex.: "I0708 00:12:...").
          stage.match {
            selector = "{cluster=\"homelab\"} |~ \"^I[0-9]{4} \""
            stage.static_labels { values = { level = "info" } }
          }
          stage.match {
            selector = "{cluster=\"homelab\"} |~ \"^W[0-9]{4} \""
            stage.static_labels { values = { level = "warn" } }
          }
          stage.match {
            selector = "{cluster=\"homelab\"} |~ \"^E[0-9]{4} \""
            stage.static_labels { values = { level = "error" } }
          }
          stage.match {
            selector = "{cluster=\"homelab\"} |~ \"^F[0-9]{4} \""
            stage.static_labels { values = { level = "fatal" } }
          }
        }

        // Envia ao Loki local (gateway)
        loki.write "default" {
          endpoint {
            url = "http://loki-gateway.observability.svc/loki/api/v1/push"
          }
        }

        //// ─── PROFILES: eBPF → Pyroscope ───────────────────────────────────
        // Perfila (CPU) os processos dos pods por eBPF, sem tocar nas apps.
        // Single-node: mira todos os pods; em multi-node, cada Alloy só resolve os PIDs locais.
        discovery.relabel "ebpf" {
          targets = discovery.kubernetes.pods.targets
          rule {
            source_labels = ["__meta_kubernetes_namespace"]
            target_label  = "namespace"
          }
          rule {
            source_labels = ["__meta_kubernetes_pod_name"]
            target_label  = "pod"
          }
          rule {
            source_labels = ["__meta_kubernetes_pod_container_name"]
            target_label  = "container"
          }
          rule {
            source_labels = ["__meta_kubernetes_namespace", "__meta_kubernetes_pod_name"]
            separator     = "/"
            target_label  = "service_name"
          }
        }

        pyroscope.ebpf "default" {
          forward_to = [pyroscope.write.default.receiver]
          targets    = discovery.relabel.ebpf.output
        }

        pyroscope.write "default" {
          endpoint {
            url = "http://pyroscope.observability.svc:4040"
          }
        }
