uptime-kuma:
  image:
    tag: "2.3.0"

  # PVC é RWO: evita 2 pods disputando o volume/SQLite durante rollout
  # (mesma justificativa do manifesto raw antigo, ver git history).
  strategy:
    type: Recreate

  volume:
    enabled: true
    existingClaim: uptime-kuma-data

  ingress:
    enabled: true
    className: traefik
    hosts:
      - host: "uptime.mvps.com.br"
        paths:
          - path: /
            pathType: Prefix

  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  serviceMonitor:
    enabled: false
