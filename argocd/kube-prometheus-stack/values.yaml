# =============================================================
# kube-prometheus-stack - home-lab k3s
# Chart: https://github.com/prometheus-community/helm-charts
# Atualizar targetRevision no Application ao trocar versão
# =============================================================

# ---- Prometheus Operator ----
prometheusOperator:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
  admissionWebhooks:
    enabled: true
    patch:
      resources:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 64Mi

# ---- Prometheus ----
prometheus:
  prometheusSpec:
    replicas: 1
    retention: 15d
    retentionSize: "18GB"

    # Monitora TODOS os namespaces — sem isso só enxerga o próprio namespace
    serviceMonitorSelector: {}
    serviceMonitorNamespaceSelector: {}
    podMonitorSelector: {}
    podMonitorNamespaceSelector: {}
    ruleSelector: {}
    ruleNamespaceSelector: {}
    probeSelector: {}
    probeNamespaceSelector: {}

    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi

    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 20Gi

    # Scrape do Alloy (coletor de logs) e do Loki
    additionalScrapeConfigs:
      - job_name: alloy
        static_configs:
          - targets: ["alloy.observability.svc.cluster.local:12345"]
            labels:
              app: alloy
              namespace: observability
      - job_name: loki
        static_configs:
          - targets: ["loki.observability.svc.cluster.local:3100"]
            labels:
              app: loki
              namespace: observability

# ---- Alertmanager ----
alertmanager:
  alertmanagerSpec:
    replicas: 1
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 2Gi

  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: ["alertname", "cluster", "severity"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: "null"
      routes:
        - matchers:
            - alertname = "Watchdog"
          receiver: "null"
        - matchers:
            - alertname = "InfoInhibitor"
          receiver: "null"
    receivers:
      - name: "null"
    inhibit_rules:
      - source_matchers:
          - severity = "critical"
        target_matchers:
          - severity = "warning"
        equal: ["alertname", "cluster", "namespace"]

# ---- Grafana ----
grafana:
  enabled: true
  adminPassword: "M@rcus2031"

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi

  persistence:
    enabled: true
    storageClassName: local-path
    size: 5Gi

  # Loki como datasource adicional (além do Prometheus que já vem por padrão)
  additionalDataSources:
    - name: Loki
      type: loki
      uid: loki
      url: http://loki.observability.svc.cluster.local:3100
      access: proxy
      editable: false
      jsonData:
        maxLines: 5000
        derivedFields:
          - name: TraceID
            matcherRegex: "traceID=(\\w+)"
            url: "$${__value.raw}"

  grafana.ini:
    analytics:
      check_for_updates: false
      reporting_enabled: false
    security:
      allow_embedding: true
    users:
      allow_sign_up: false
    unified_alerting:
      enabled: true

# ---- Node Exporter ----
nodeExporter:
  enabled: true

prometheus-node-exporter:
  resources:
    requests:
      cpu: 50m
      memory: 32Mi
    limits:
      cpu: 200m
      memory: 128Mi
  extraArgs:
    # k3s usa containerd — exclui paths do containerd e do k3s também
    - --collector.filesystem.mount-points-exclude=^/(dev|proc|sys|var/lib/docker/.+|var/lib/containerd/.+|var/lib/kubelet/pods/.+|run/k3s/.+)($|/)
    - --collector.netclass.ignored-devices=^(veth|cni|flannel|cali|tunl|kube).*$
    - --collector.netdev.device-exclude=^(veth|cni|flannel|cali|tunl|kube).*$
    - --no-collector.ipvs
  tolerations:
    - key: node-role.kubernetes.io/master
      operator: Exists
      effect: NoSchedule
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule

# ---- kube-state-metrics ----
kubeStateMetrics:
  enabled: true

kube-state-metrics:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

# ---- Componentes do k3s: desabilitar o que não existe ----
# k3s integra controller-manager e scheduler no binário principal
# kube-proxy não existe no k3s (usa iptables/nftables direto)
kubeControllerManager:
  enabled: false

kubeScheduler:
  enabled: false

kubeProxy:
  enabled: false

# k3s usa SQLite por padrão (ou etcd embarcado com --cluster-init)
# Só habilitar se usar k3s com etcd externo
kubeEtcd:
  enabled: false
