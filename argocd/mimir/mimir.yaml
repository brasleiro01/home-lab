# Grafana Mimir — modo MONOLÍTICO (single binary, -target=all), backend no MinIO.
# Retenção de blocos no object storage: 15 dias. Rings via memberlist (funciona single-node).
# O Prometheus faz remote_write pra cá; o Grafana consulta via datasource "Mimir".
apiVersion: v1
kind: ConfigMap
metadata:
  name: mimir-config
  namespace: observability
data:
  mimir.yaml: |
    multitenancy_enabled: false

    server:
      http_listen_port: 8080
      grpc_listen_port: 9095
      log_level: info

    # config S3 comum (herdada por blocks_storage e ruler_storage)
    common:
      storage:
        backend: s3
        s3:
          endpoint: minio.observability.svc:9000
          access_key_id: minioadmin
          secret_access_key: minioadmin123
          insecure: true

    blocks_storage:
      s3:
        bucket_name: mimir-blocks
      tsdb:
        dir: /data/tsdb
      bucket_store:
        sync_dir: /data/tsdb-sync

    ruler_storage:
      s3:
        bucket_name: mimir-ruler

    compactor:
      data_dir: /data/compactor

    ingester:
      ring:
        replication_factor: 1
        final_sleep: 0s

    store_gateway:
      sharding_ring:
        replication_factor: 1

    # RETENÇÃO: 15 dias de blocos no object storage (o compactor apaga o que passa disso)
    limits:
      compactor_blocks_retention_period: 15d
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mimir-data
  namespace: observability
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: local-path
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mimir
  namespace: observability
  labels:
    app: mimir
spec:
  replicas: 1
  strategy:
    type: Recreate            # PVC RWO
  selector:
    matchLabels:
      app: mimir
  template:
    metadata:
      labels:
        app: mimir
    spec:
      securityContext:
        fsGroup: 10001
        runAsUser: 10001
        runAsNonRoot: true
      containers:
        - name: mimir
          image: grafana/mimir:2.14.0
          args:
            - -config.file=/etc/mimir/mimir.yaml
            - -target=all
          ports:
            - name: http
              containerPort: 8080
          volumeMounts:
            - name: config
              mountPath: /etc/mimir
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet: { path: /ready, port: http }
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests: { cpu: 200m, memory: 512Mi }
            limits:   { cpu: "1", memory: 1536Mi }
      volumes:
        - name: config
          configMap:
            name: mimir-config
        - name: data
          persistentVolumeClaim:
            claimName: mimir-data
---
apiVersion: v1
kind: Service
metadata:
  name: mimir
  namespace: observability
  labels:
    app: mimir
spec:
  selector:
    app: mimir
  ports:
    - name: http
      port: 8080
      targetPort: http
