# kubernetes-event-exporter — captura os Events do k8s (OOMKilled, evictions, FailedScheduling,
# ImagePullBackOff, Unhealthy...) e envia pro Loki (sink nativo). Assim eles ficam pesquisáveis
# junto com os logs, em vez de sumirem da API em ~1h.
# Baseado no deploy oficial (resmoio), namespace ajustado p/ observability.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: event-exporter
  namespace: observability
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: event-exporter
rules:
  # leitura ampla (read-only) p/ enriquecer o evento com metadados do objeto envolvido
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["get", "watch", "list"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: event-exporter
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: event-exporter
subjects:
  - kind: ServiceAccount
    name: event-exporter
    namespace: observability
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: event-exporter-cfg
  namespace: observability
data:
  config.yaml: |
    logLevel: info
    logFormat: json
    route:
      routes:
        - match:
            - receiver: "loki"
    receivers:
      - name: "loki"
        loki:
          url: "http://loki-gateway.observability.svc/loki/api/v1/push"
          # labels indexados do stream no Loki (baixa cardinalidade)
          streamLabels:
            app: event-exporter
            source: kubernetes-events
          # corpo do log (JSON) — filtre no Loki com: {app="event-exporter"} | json | type="Warning"
          layout:
            namespace: "{{ .Namespace }}"
            reason: "{{ .Reason }}"
            type: "{{ .Type }}"
            kind: "{{ .InvolvedObject.Kind }}"
            object: "{{ .InvolvedObject.Name }}"
            component: "{{ .Source.Component }}"
            count: "{{ .Count }}"
            message: "{{ .Message }}"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: event-exporter
  namespace: observability
  labels:
    app: event-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: event-exporter
      version: v1
  template:
    metadata:
      labels:
        app: event-exporter
        version: v1
    spec:
      serviceAccountName: event-exporter
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: event-exporter
          image: ghcr.io/resmoio/kubernetes-event-exporter:v1.7
          imagePullPolicy: IfNotPresent
          args:
            - -conf=/data/config.yaml
          volumeMounts:
            - mountPath: /data
              name: cfg
          resources:
            requests: { cpu: 25m, memory: 64Mi }
            limits:   { cpu: 100m, memory: 128Mi }
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
      volumes:
        - name: cfg
          configMap:
            name: event-exporter-cfg
