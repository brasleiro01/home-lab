apiVersion: v1
kind: Secret
metadata:
  name: bootstrap-secret
  namespace: cattle-system
  annotations:
    # aplica ANTES do Deployment do Rancher (o pod lê essa senha no 1º boot)
    argocd.argoproj.io/sync-wave: "-1"
type: Opaque
stringData:
  # Troque pela sua senha. É a senha do 1º login (admin); depois de logar e definir a senha
  # definitiva no Rancher, este valor deixa de conceder acesso.
  bootstrapPassword: "TROQUE_ESTA_SENHA"
