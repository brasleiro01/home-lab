apiVersion: v1
kind: Service
metadata:
  name: pihole-svc
  namespace: pihole
  labels:
    app: pihole
  annotations:
    metallb.universe.tf/loadBalancerIPs: "192.168.15.201"
    metallb.universe.tf/address-pool: "pihole-pool"
spec:
  type: LoadBalancer
  selector:
    app: pihole
  ports:
    - name: dns-tcp
      port: 53
      targetPort: 53
      protocol: TCP
    - name: dns-udp
      port: 53
      targetPort: 53
      protocol: UDP
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
