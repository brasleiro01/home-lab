# Instrumentation: define COMO o operator auto-instrumenta a app.
# O pod do k8s-monitor referencia isto via annotation
# (instrumentation.opentelemetry.io/inject-python: "k8s-monitor-otel").
# Requer a CRD do OpenTelemetry Operator (app "opentelemetry-operator", sync-wave 1).
apiVersion: opentelemetry.io/v1alpha1
kind: Instrumentation
metadata:
  name: k8s-monitor-otel
  namespace: k8s-monitor
spec:
  # traces vão pro Alloy (gateway OTLP) → Tempo. HTTP 4318 (FQDN cross-namespace).
  # A imagem de auto-instrumentação Python do operator SÓ traz o exporter HTTP
  # (otlp_proto_http); gRPC quebra com "otlp_proto_grpc not found".
  exporter:
    endpoint: http://alloy.observability.svc.cluster.local:4318
  propagators:
    - tracecontext
    - baggage
  sampler:
    type: always_on          # homelab: 100% dos traces
  python:
    env:
      - name: OTEL_EXPORTER_OTLP_PROTOCOL
        value: http/protobuf
      # só queremos traces -> Tempo; evita o SDK tentar exportar métricas/logs
      - name: OTEL_METRICS_EXPORTER
        value: none
      - name: OTEL_LOGS_EXPORTER
        value: none
