apiVersion: v1
kind: Namespace
metadata:
  name: k8s-monitor

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8s-monitor
  namespace: k8s-monitor

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k8s-monitor-reader
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k8s-monitor-reader-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: k8s-monitor-reader
subjects:
  - kind: ServiceAccount
    name: k8s-monitor
    namespace: k8s-monitor

---
# Token estático (não expira) — evita o problema de 401 com tokens projetados no K3s
apiVersion: v1
kind: Secret
metadata:
  name: k8s-monitor-sa-token
  namespace: k8s-monitor
  annotations:
    kubernetes.io/service-account.name: k8s-monitor
type: kubernetes.io/service-account-token
