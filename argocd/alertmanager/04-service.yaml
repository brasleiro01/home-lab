apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: observability
  labels:
    app: alertmanager
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9093"
spec:
  type: ClusterIP
  selector:
    app: alertmanager
  ports:
    - name: http
      port: 9093
      targetPort: 9093
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager-headless
  namespace: observability
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: alertmanager
  ports:
    - name: http
      port: 9093
      targetPort: 9093
