apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-config
  namespace: observability
type: Opaque
stringData:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m
      # smtp_smarthost: 'smtp.gmail.com:587'
      # smtp_from: 'alertmanager@yourdomain.com'
      # smtp_auth_username: 'alertmanager@yourdomain.com'
      # smtp_auth_password: 'your-app-password'

    route:
      group_by: ['alertname', 'cluster', 'severity']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: 'null'
      routes:
        - matchers:
            - alertname = "Watchdog"
          receiver: 'null'
        - matchers:
            - severity = "critical"
          receiver: 'null'
          # receiver: 'email-notifications'

    receivers:
      - name: 'null'

      # - name: 'email-notifications'
      #   email_configs:
      #     - to: 'your-email@example.com'
      #       send_resolved: true

    inhibit_rules:
      - source_matchers:
          - severity = "critical"
        target_matchers:
          - severity = "warning"
        equal: ['alertname', 'cluster', 'namespace']
