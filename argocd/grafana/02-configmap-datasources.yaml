apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: observability
  labels:
    grafana_datasource: "1"
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        url: http://prometheus:9090
        access: proxy
        isDefault: true
        editable: false
        jsonData:
          timeInterval: 30s
          queryTimeout: 60s
          httpMethod: POST

      - name: Loki
        type: loki
        uid: loki
        url: http://loki:3100
        access: proxy
        editable: false
        jsonData:
          maxLines: 5000
          derivedFields:
            - datasourceUid: prometheus
              matcherRegex: "traceID=(\\w+)"
              name: TraceID
              url: "$${__value.raw}"

      - name: Alertmanager
        type: alertmanager
        uid: alertmanager
        url: http://alertmanager:9093
        access: proxy
        editable: false
        jsonData:
          implementation: prometheus
